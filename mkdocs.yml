site_name: 齐昊宇 | Portfolio
site_description: 个人项目与实习经历展示
site_url: https://andyqi1223212.github.io/

# MkDocs 1.6+ 默认会校验链接；部分相对路径/锚点在 Material 下易误报，CI 上可能直接导致 build 失败
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

theme:
  name: material
  language: zh
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    logo: material/account-circle

extra_css:
  - assets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # 勿同时开 anchor_linenums + line_spans：部分 Pygments 会收到 filename=None 导致 CI 崩溃
  # AttributeError: 'NoneType' object has no attribute 'replace'（html.escape）
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: false

plugins:
  - search:
      lang: zh
  # glightbox 在部分 Linux CI 环境下 post_build 解析 HTML 会失败；先关闭以保证 Pages 稳定上线
  # - glightbox

nav:
  - 首页: index.md
  - 项目经历:
      - 总览: projects/index.md
      - ANR 性能优化与实验设计: projects/anr-optimization.md
      - Growth Accounting Framework: projects/growth-accounting.md
      - 广告渠道特征分析: projects/ad-channel-analysis.md
  - 关于我: about.md
