# MkDocs → gh-pages；Pages：Deploy from branch → gh-pages → / (root)
name: deploy

on:
  push:
    branches: [main]

# GITHUB_TOKEN 推 gh-pages：Settings → Actions → General → Workflow permissions = Read and write
permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      # 消除 Node 20 弃用警告，并提前对齐 Actions 默认 Node 24
      # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 不用 `mkdocs | tee`：在 pipefail 下部分环境会以 pipeline 最后一程的退出码为准，导致构建失败仍显示成功或反之混乱
      - name: Build site
        run: |
          set -euxo pipefail
          python -m mkdocs --version
          if ! python -m mkdocs build --verbose > mkdocs-build.log 2>&1; then
            echo "::error::mkdocs build failed, tail of log:"
            tail -n 120 mkdocs-build.log
            exit 1
          fi
          test -f site/index.html

      - name: Disable Jekyll (GitHub Pages)
        run: touch site/.nojekyll

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
