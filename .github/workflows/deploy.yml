# MkDocs → gh-pages；Pages 设置：Deploy from branch → gh-pages → / (root)
name: deploy

on:
  push:
    branches: [main]

# GITHUB_TOKEN 需要能推 gh-pages：仓库 Settings → Actions → General → Workflow permissions 选「Read and write」
permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        run: |
          set -euxo pipefail
          python -m mkdocs --version
          python -m mkdocs build --verbose 2>&1 | tee mkdocs-build.log
          test -f site/index.html

      - name: Print mkdocs log tail on failure
        if: failure()
        run: tail -n 200 mkdocs-build.log || true

      - name: Disable Jekyll (GitHub Pages)
        run: touch site/.nojekyll

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
