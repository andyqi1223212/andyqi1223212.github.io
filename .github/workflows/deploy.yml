# MkDocs 构建后推送到 gh-pages 分支；仓库 Settings → Pages 选「Deploy from a branch」→ gh-pages → / (root)
# （比「GitHub Actions」artifact 源更不易漏配，避免 main 根目录无 index.html 导致 404）
name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 避免 Linux 默认 ASCII locale 下中文站点名/内容触发编码错误
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 暂不用 --strict：部分环境下与本地一致的警告会被 strict 判失败，导致整站无法发布
      - name: Build site
        run: mkdocs build

      - name: Disable Jekyll (GitHub Pages)
        run: touch site/.nojekyll

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
